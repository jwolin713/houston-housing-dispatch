[build]
builder = "nixpacks"
installCmd = "python -m venv --copies /opt/venv && . /opt/venv/bin/activate && pip install -r requirements.txt && pip install -e ."
startCmd = "houston-dispatch server --host 0.0.0.0 --port ${PORT:-8000}"

[deploy]
healthcheckPath = "/health/"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5
